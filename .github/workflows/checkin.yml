name: 起点读书自动签到

on:
  schedule:
    - cron: '0 22 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: "账号 1 签到"
        run: node qdreader.js || true
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules
          QDREADER_COOKIE: ${{ secrets.QDREADER_COOKIE }}
          QDREADER_DEBUG: ${{ secrets.QDREADER_DEBUG }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_USER_ID: ${{ secrets.TG_USER_ID }}
      - name: "账号 2 签到"
        if: ${{ secrets.QDREADER_COOKIE_2 != '' }}
        run: node qdreader.js || true
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules
          QDREADER_COOKIE: ${{ secrets.QDREADER_COOKIE_2 }}
          QDREADER_DEBUG: ${{ secrets.QDREADER_DEBUG }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_USER_ID: ${{ secrets.TG_USER_ID }}
