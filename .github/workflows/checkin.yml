name: 起点读书自动签到

on:
  schedule:
    - cron: '11 2 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node qdreader.js
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules
          QDREADER_COOKIE: ${{ secrets.QDREADER_COOKIE }}
          QDREADER_DEBUG: ${{ secrets.QDREADER_DEBUG }}
