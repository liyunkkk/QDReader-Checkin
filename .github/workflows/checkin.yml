name: 起点读书自动签到

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  checkin:
    strategy:
      matrix:
        account: [1, 2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: "账号 ${{ matrix.account }} 签到"
        run: node qdreader.js || true
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules
          QDREADER_COOKIE: ${{ secrets[format('QDREADER_COOKIE_{0}', matrix.account)] }}
          QDREADER_DEBUG: ${{ secrets.QDREADER_DEBUG }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_USER_ID: ${{ secrets.TG_USER_ID }}
